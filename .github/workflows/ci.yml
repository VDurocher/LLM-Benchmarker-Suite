name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        # Install runtime deps + test tools directly.
        # Editable install fails with flat-layout multi-package discovery.
        # PYTHONPATH is set in the test step to allow imports from the project root.
        run: pip install "scikit-learn>=1.4.0" "jsonschema>=4.21.0" "numpy>=1.26.0" "openai>=1.30.0" "anthropic>=0.18.0" pytest pytest-cov

      - name: Run tests
        run: PYTHONPATH=${{ github.workspace }} pytest tests/ -v --tb=short
